<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>README Generator</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      margin-left: 10px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 400px;
      margin-top: 20px;
      padding: 10px;
      font-family: monospace;
    }
  </style>
</head>

<body>

  <h1>🚀 GitHub README Generator</h1>

  <div class="container">

    <input
      id="repo"
      placeholder="Enter GitHub Repo URL (https://github.com/user/repo)"
    />

    <button onclick="generate()">Generate</button>

    <button onclick="copy()">Copy</button>

    <textarea id="output" placeholder="Generated README will appear here..."></textarea>

  </div>

  <script>
async function generate() {
  const repoUrl = document.getElementById("repo").value;
  const output = document.getElementById("output");

  if (!repoUrl) {
    alert("Please enter a repo URL");
    return;
  }

  output.value = "⏳ Generating README...";

  try {
    const res = await fetch("/api/repo/analyse", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ repoUrl })
    });

    const data = await res.json();

    output.value = data.readme || "⚠️ No README returned";

  } catch (err) {
    output.value = "❌ Error generating README";
    console.error(err);
  }
}

async function copy() {
  const text = document.getElementById("output").value;
  await navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>
</body>
</html>
